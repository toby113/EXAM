<script>
const studentLoginUrl = '/login.html?role=student&return_to=' + encodeURIComponent(location.pathname + location.search);
const params = new URLSearchParams(location.search);
const presetToken = params.get('token') || '';
const RECENT_LOOKUP_KEY = 'recent_lookup_records_v1';
const RECENT_LOOKUP_LIMIT = 20;

function formatShortCode(code) {
  if (!code || code.length < 8) return code || '—';
  return code.substring(0, 4) + '-' + code.substring(4);
}

function redirectToStudentLogin() {
  location.replace(studentLoginUrl);
}

async function ensureStudentSession() {
  try {
    const res = await fetch('/api/student/me', { credentials: 'same-origin' });
    if (!res.ok) {
      redirectToStudentLogin();
      return false;
    }
    return true;
  } catch (_) {
    redirectToStudentLogin();
    return false;
  }
}

function readRecentLookups() {
  try {
    const raw = localStorage.getItem(RECENT_LOOKUP_KEY);
    const list = JSON.parse(raw || '[]');
    if (!Array.isArray(list)) return [];
    return list.filter(item => item && item.lookup_token && item.submission_id);
  } catch (_) {
    return [];
  }
}

function writeRecentLookups(list) {
  try {
    localStorage.setItem(RECENT_LOOKUP_KEY, JSON.stringify(list.slice(0, RECENT_LOOKUP_LIMIT)));
  } catch (_) {}
}

function rememberLookupRecord(record) {
  if (!record || !record.lookup_token || !record.submission_id) return;
  const normalized = {
    submission_id: Number(record.submission_id),
    exam_id: Number(record.exam_id || 0) || null,
    lookup_token: String(record.lookup_token),
    exam_title: String(record.exam_title || ''),
    submitted_at: String(record.submitted_at || ''),
    student_name: String(record.student_name || ''),
    saved_at: new Date().toISOString()
  };
  const current = readRecentLookups();
  const merged = [normalized, ...current.filter(item =>
    !(Number(item.submission_id) === normalized.submission_id && String(item.lookup_token) === normalized.lookup_token)
  )];
  writeRecentLookups(merged);
}

function formatDateTime(text) {
  if (!text) return '—';
  const d = new Date(text);
  if (Number.isNaN(d.getTime())) return escHtml(text);
  return d.toLocaleString('zh-TW', { hour12: false });
}

  const pct = data.total_score > 0 ? Math.round(data.score * 100 / data.total_score) : 0;
  const safeToken = encodeURIComponent(token);
  return `
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
      <div>
        <p class="text-sm text-gray-500 mb-1">${escHtml(data.exam_title || '試卷')}</p>
        <h2 class="text-xl font-bold text-gray-800">${escHtml(data.student_name || '考生')}</h2>
        <p class="text-sm text-gray-500 mt-1">${escHtml(data.student_id || '未填學號')} · ${escHtml(data.status || '')}</p>
      </div>
      <div class="text-right">
        <p class="text-4xl font-bold ${pct >= 80 ? 'text-green-600' : pct >= 60 ? 'text-amber-600' : 'text-red-600'}">${pct}%</p>
        <p class="text-sm text-gray-500">${data.score}/${data.total_score} 分</p>
      </div>
    </div>
    <div class="mt-6 flex flex-wrap gap-3">
      <a href="/result.html?id=${data.id}&token=${safeToken}" class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2 rounded-lg font-medium transition-colors">查看成績明細</a>
      <a href="/analysis.html?id=${data.id}&token=${safeToken}" class="bg-emerald-600 hover:bg-emerald-700 text-white px-5 py-2 rounded-lg font-medium transition-colors">查看答題分析</a>
    </div>
  `;
}

async function loadMySubmissions() {
  const listEl = document.getElementById('my-submissions-list');

    listEl.innerHTML = `<div class="text-center py-6 text-red-500">${escHtml(data.error || '載入失敗')}</div>`;
    return;
  }
  const rows = Array.isArray(data.submissions) ? data.submissions : [];

    listEl.innerHTML = '<div class="text-center py-6 text-gray-400">目前沒有已繳交的作答紀錄</div>';
    return;
  }

  listEl.innerHTML = rows.map(row => {

    const safeToken = encodeURIComponent(row.lookup_token || '');

    return `
      <div class="rounded-xl border border-gray-200 p-4">
        <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
          <div>
            <div class="font-semibold text-gray-800">${escHtml(row.exam_title || '試卷')}</div>

          <a href="/analysis.html?id=${row.id}&token=${safeToken}" class="px-3 py-1.5 rounded-lg bg-emerald-600 hover:bg-emerald-700 text-white text-sm">答題分析</a>
          <button onclick="useLookupToken('${escHtml(row.short_code || row.lookup_token || '')}')" class="px-3 py-1.5 rounded-lg border border-gray-300 text-gray-600 text-sm hover:bg-gray-50">帶入查詢碼</button>
        </div>
      </div>
    `;
  }).join('');
}

function useLookupToken(token) {
  document.getElementById('lookup-token').value = token || '';
  lookupSubmission();
}

async function lookupSubmission() {
  const raw = document.getElementById('lookup-token').value.trim();
  // 標準化：移除分隔號並轉大寫（支援 XXXX-XXXX 格式）
  const token = raw.replace(/-/g, '').toUpperCase() || raw;
  const errorEl = document.getElementById('lookup-error');
  const resultEl = document.getElementById('lookup-result');
  errorEl.classList.add('hidden');
  resultEl.classList.add('hidden');
  if (!token) {
    errorEl.textContent = '請輸入查詢碼';
    errorEl.classList.remove('hidden');
    return false;
  }
  const res = await fetch(`/api/submissions/lookup?token=${encodeURIComponent(token)}`);
  const data = await res.json().catch(() => ({}));
  if (!res.ok) {
    errorEl.textContent = data.error || '查詢失敗';
    errorEl.classList.remove('hidden');
    return false;
  }
  // 使用回傳的完整 lookup_token 存入歷史（確保之後可用）
  const lookupKey = data.lookup_token || token;
  rememberLookupRecord({
    submission_id: data.id,
    exam_id: data.exam_id,
    lookup_token: lookupKey,
    exam_title: data.exam_title,
    submitted_at: data.submitted_at,
    student_name: data.student_name
  });
  resultEl.innerHTML = renderLookupSummary(data, lookupKey);
  resultEl.classList.remove('hidden');
  return true;
}

async function logoutStudent() {
  try {
    await fetch('/api/student/logout', { method: 'POST', credentials: 'same-origin' });
  } catch (_) {}
  location.replace('/login.html?role=student');
}

function escHtml(s){if(s==null)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

window.addEventListener('pageshow', (event) => {
  if (!event.persisted) return;
  ensureStudentSession().then(ok => {
    if (!ok) return;
    loadMySubmissions();
  });
});

async function initPage() {
  if (!(await ensureStudentSession())) return;
  await loadMySubmissions();
  if (presetToken) {
    document.getElementById('lookup-token').value = presetToken;
    lookupSubmission();
  }
}

initPage();
</script>
