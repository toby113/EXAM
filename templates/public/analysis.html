<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>答題分析報告 - 數理資優班考題系統</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
html{overflow-y:scroll;}
body{font-family:'Noto Sans TC',sans-serif;}
.top-nav-btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  height:36px;
  line-height:1;
  box-sizing:border-box;
  white-space:nowrap;
}
.tab-btn{transition:all .2s;}
.tab-btn.active{background:#4338ca;color:#fff;}
</style>
</head>
<body class="bg-gray-100 min-h-screen">
<header class="bg-indigo-700 text-white py-4 px-6 shadow sticky top-0 z-50">
  <div class="max-w-7xl mx-auto flex items-center gap-4">
    <a href="/exam-list.html" class="top-nav-btn text-white hover:text-white bg-white/10 hover:bg-white/20 border border-white/30 px-4 py-1.5 rounded-lg text-sm font-medium transition-colors">🎓 學生首頁</a>
    <div class="flex gap-2 flex-wrap items-center">
      <a href="/exam-list.html" class="tab-btn top-nav-btn px-4 py-1.5 rounded-lg text-sm font-medium border border-white/30 text-indigo-200 hover:text-white hover:bg-white/10">📝 選擇考題</a>
      <a href="/results.html" class="tab-btn top-nav-btn px-4 py-1.5 rounded-lg text-sm font-medium border border-white/30 text-indigo-200 hover:text-white hover:bg-white/10">📊 成績查詢</a>
      <span class="tab-btn top-nav-btn active px-4 py-1.5 rounded-lg text-sm font-medium border border-white/30">📊 答題分析報告</span>
    </div>
    <div class="ml-auto flex items-center gap-2">
      <button onclick="logoutStudent()" class="top-nav-btn px-4 py-1.5 rounded-lg text-sm font-medium border border-white/30 text-indigo-200 hover:text-white hover:bg-white/10 transition-colors">登出</button>
    </div>
  </div>
</header>
<main class="max-w-7xl mx-auto px-4 py-6" id="analysis-container">
  <div class="text-center py-16 text-gray-500">載入中...</div>
</main>
<script>
const studentLoginUrl = '/login.html?role=student&return_to=' + encodeURIComponent(location.pathname + location.search);
const params = new URLSearchParams(location.search);
const id = params.get('id');
const token = params.get('token');

function redirectToStudentLogin() {
  location.replace(studentLoginUrl);
}

async function ensureStudentSession() {
  try {
    const res = await fetch('/api/student/me', { credentials: 'same-origin' });
    if (!res.ok) {
      redirectToStudentLogin();
      return false;
    }
    return true;
  } catch (_) {
    redirectToStudentLogin();
    return false;
  }
}

function getOptionLabel(q, letter) {
  if (!letter) return '（未作答）';
  if (q.type === 'true_false') return letter.toUpperCase() === 'T' ? '是' : '否';
  const map = { A: q.option_a, B: q.option_b, C: q.option_c, D: q.option_d };
  const text = map[letter.toUpperCase()];
  return text ? letter.toUpperCase() + '. ' + escHtml(text) : letter.toUpperCase();
}
function escHtml(s){if(s==null)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

async function loadAnalysis() {
  if (!id || !token) {
    document.getElementById('analysis-container').innerHTML = '<p class="text-center py-16 text-red-500">缺少分析查詢參數</p>';
    return;
  }
  const res = await fetch(`/api/submissions/${id}/analysis?token=${encodeURIComponent(token)}`);
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    document.getElementById('analysis-container').innerHTML = `<p class="text-center py-16 text-red-500">${escHtml(err.error || '找不到分析資料')}</p>`;
    return;
  }
  const d = await res.json();
  const pct = d.percentage;
  const pctColor = pct >= 80 ? 'text-green-600' : pct >= 60 ? 'text-yellow-600' : 'text-red-600';
  const pctBg    = pct >= 80 ? 'bg-green-50 border-green-200' : pct >= 60 ? 'bg-yellow-50 border-yellow-200' : 'bg-red-50 border-red-200';
  const diffLabel = {1:'★ 入門',2:'★★ 基礎',3:'★★★ 中級',4:'★★★★ 進階',5:'★★★★★ 競賽'};

  // 科目進度條
  const subjectBars = Object.entries(d.by_subject).map(([name, v]) => {
    const rate = v.total ? Math.round(v.correct * 100 / v.total) : 0;
    const barColor = rate >= 80 ? 'bg-green-500' : rate >= 60 ? 'bg-yellow-400' : 'bg-red-400';
    return `
      <div class="mb-3">
        <div class="flex justify-between text-sm mb-1">
          <span class="font-medium text-gray-700">${name}</span>
          <span class="text-gray-500">${v.correct}/${v.total} 題答對（${rate}%）</span>
        </div>
        <div class="w-full bg-gray-200 rounded-full h-3">
          <div class="${barColor} h-3 rounded-full transition-all" style="width:${rate}%"></div>
        </div>
      </div>
    `;
  }).join('');

  // 難度分布
  const diffRows = Object.entries(d.by_difficulty)
    .filter(([, v]) => v.total > 0)
    .map(([diff, v]) => {
      const rate = Math.round(v.correct * 100 / v.total);
      const c = rate >= 80 ? 'text-green-600' : rate >= 60 ? 'text-yellow-600' : 'text-red-600';
      return `
        <tr class="border-b border-gray-100">
          <td class="px-4 py-2 text-sm text-gray-700">${diffLabel[diff]||diff}</td>
          <td class="px-4 py-2 text-sm text-center">${v.total}</td>
          <td class="px-4 py-2 text-sm text-center text-green-600">${v.correct}</td>
          <td class="px-4 py-2 text-sm text-center text-red-500">${v.wrong}</td>
          <td class="px-4 py-2 text-sm text-center font-bold ${c}">${rate}%</td>
        </tr>
      `;
    }).join('');

  // 弱點題目
  const weakHtml = d.weak_questions.length ? d.weak_questions.map((q, i) => {
    const isDontKnow = q.given_answer === '__dont_know__';
    const borderCls  = isDontKnow ? 'border-orange-400' : 'border-red-400';
    const statusTag  = isDontKnow ? '<span class="text-xs text-orange-500">🤷 我不會</span>' : '<span class="text-xs text-red-500">✗ 答錯</span>';
    const givenHtml  = isDontKnow
      ? '<p>你的答案：<span class="text-orange-600 font-medium">🤷 我不會</span></p>'
      : (['choice','true_false'].includes(q.type)
          ? `<p>你的答案：<span class="text-red-500 font-medium">${getOptionLabel(q, q.given_answer)}</span></p>`
          : `<p>你的答案：<span class="text-red-500 font-medium">${escHtml(q.given_answer)||'（未作答）'}</span></p>`);
    return `
    <div class="bg-white rounded-xl shadow p-5 border-l-4 ${borderCls} mb-3">
      <div class="flex justify-between mb-2">
        <span class="text-sm font-medium text-gray-500">第 ${i+1} 題 · ${q.subject_name} · ${'★'.repeat(q.difficulty||1)}</span>
        ${statusTag}
      </div>
      <p class="text-gray-800 mb-2">${escHtml(q.content)}</p>
      <div class="text-sm space-y-1">
        ${givenHtml}
        <p>正確答案：<span class="text-gray-500 font-medium">（答案不公開）</span></p>
        ${q.explanation ? `<p class="text-gray-500 mt-2 bg-gray-50 p-2 rounded">💡 ${escHtml(q.explanation)}</p>` : ''}
      </div>
    </div>
  `;
  }).join('') : '<p class="text-gray-400 text-center py-4">🎉 全部答對，沒有弱點題目！</p>';

  document.getElementById('analysis-container').innerHTML = `
    <!-- 頂部概覽 -->
    <div class="bg-white rounded-xl shadow p-6 mb-6 ${pctBg} border">
      <div class="text-center mb-4">
        <h2 class="text-2xl font-bold text-gray-800 mb-1">${escHtml(d.student_name)} 的答題分析報告</h2>
        <p class="text-gray-500 text-sm">${escHtml(d.exam_title)} ｜ ${d.submitted_at}</p>
      </div>
      <div class="flex justify-center gap-12 mt-6">
        <div class="text-center">
          <div class="text-5xl font-bold ${pctColor}">${pct}%</div>
          <p class="text-gray-500 text-sm mt-1">得分率</p>
        </div>
        <div class="text-center">
          <div class="text-4xl font-bold text-gray-700">${d.score}/${d.total_score}</div>
          <p class="text-gray-500 text-sm mt-1">得分</p>
        </div>
        <div class="text-center">
          <div class="text-4xl font-bold text-green-600">${d.correct_count}</div>
          <p class="text-gray-500 text-sm mt-1">答對</p>
        </div>
        <div class="text-center">
          <div class="text-4xl font-bold text-red-500">${d.wrong_count}</div>
          <p class="text-gray-500 text-sm mt-1">答錯</p>
        </div>
        ${d.dont_know_count > 0 ? `
        <div class="text-center">
          <div class="text-4xl font-bold text-orange-500">${d.dont_know_count}</div>
          <p class="text-gray-500 text-sm mt-1">我不會</p>
        </div>` : ''}
      </div>
    </div>

    <!-- 科目表現 -->
    <div class="bg-white rounded-xl shadow p-6 mb-6">
      <h3 class="text-lg font-bold text-gray-800 mb-4">📚 各科目表現</h3>
      ${subjectBars || '<p class="text-gray-400">無科目資料</p>'}
    </div>

    <!-- 難度分布 -->
    <div class="bg-white rounded-xl shadow p-6 mb-6">
      <h3 class="text-lg font-bold text-gray-800 mb-4">🎯 難度分布</h3>
      ${diffRows ? `
        <table class="w-full">
          <thead class="bg-gray-50 text-xs text-gray-500 uppercase">
            <tr>
              <th class="px-4 py-2 text-left">難度</th>
              <th class="px-4 py-2 text-center">共</th>
              <th class="px-4 py-2 text-center">答對</th>
              <th class="px-4 py-2 text-center">答錯</th>
              <th class="px-4 py-2 text-center">正確率</th>
            </tr>
          </thead>
          <tbody>${diffRows}</tbody>
        </table>
      ` : '<p class="text-gray-400">無難度資料</p>'}
    </div>

    <!-- 學習建議 -->
    <div class="bg-blue-50 border border-blue-200 rounded-xl p-6 mb-6">
      <h3 class="text-lg font-bold text-blue-800 mb-3">💡 學習建議</h3>
      ${d.suggestions.map(s => `<p class="text-blue-700 mb-1">• ${s}</p>`).join('')}
    </div>

    <!-- 能力估算（Rasch Model） -->
    ${d.ability_profile && d.ability_profile.length ? `
    <div class="bg-white rounded-xl shadow p-6 mb-6">
      <h3 class="text-lg font-bold text-gray-800 mb-1">🧠 能力估算</h3>
      <p class="text-xs text-gray-400 mb-4">以 Rasch IRT 模型依本次作答估算各科能力值（1–5）。樣本數越多越準確。</p>
      ${d.ability_profile.map(p => {
        const pct = p.ability !== null ? Math.round((p.ability - 1) / 4 * 100) : 0;
        const c = p.ability >= 4 ? 'bg-green-500' : p.ability >= 2.5 ? 'bg-yellow-400' : 'bg-red-400';
        const tc = p.ability >= 4 ? 'text-green-600' : p.ability >= 2.5 ? 'text-yellow-600' : 'text-red-500';
        return `<div class="mb-3">
          <div class="flex justify-between text-sm mb-1">
            <span class="font-medium text-gray-700">${p.subject_name}</span>
            <span class="font-bold ${tc}">${p.ability !== null ? p.ability + ' / 5' : '資料不足'} <span class="text-xs font-normal text-gray-400">(${p.sample_size} 題)</span></span>
          </div>
          <div class="w-full bg-gray-200 rounded-full h-3">
            <div class="${c} h-3 rounded-full transition-all" style="width:${pct}%"></div>
          </div>
        </div>`;
      }).join('')}
      <div class="mt-3 pt-3 border-t flex justify-between items-center">
        <span class="text-sm text-gray-600">綜合能力值</span>
        <span class="text-2xl font-bold ${d.overall_ability >= 4 ? 'text-green-600' : d.overall_ability >= 2.5 ? 'text-yellow-600' : 'text-red-500'}">${d.overall_ability !== null ? d.overall_ability + ' / 5' : '—'}</span>
      </div>
    </div>
    ` : ''}

    <!-- 弱點題目清單 -->
    <div class="mb-6">
      <h3 class="text-lg font-bold text-gray-800 mb-4">🔍 弱點題目（答錯題目詳析）</h3>
      ${weakHtml}
    </div>

    <!-- 底部按鈕 -->
    <div class="mt-6 flex gap-4 justify-center">
      <a href="/result.html?id=${id}&token=${encodeURIComponent(token)}" class="bg-gray-600 hover:bg-gray-700 text-white px-6 py-3 rounded-lg font-medium transition-colors">← 返回成績頁</a>
      <a href="/exam-list.html" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-3 rounded-lg font-medium transition-colors">返回考試列表</a>
      <a href="/results.html?token=${encodeURIComponent(token)}" class="bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-3 rounded-lg font-medium transition-colors">查詢碼頁面</a>
    </div>
  `;
}

async function logoutStudent() {
  try {
    await fetch('/api/student/logout', { method: 'POST', credentials: 'same-origin' });
  } catch (_) {}
  location.replace('/login.html?role=student');
}

window.addEventListener('pageshow', () => {
  ensureStudentSession();
});

async function initPage() {
  if (!(await ensureStudentSession())) return;
  loadAnalysis();
}

initPage();

</script>
</body>
</html>
